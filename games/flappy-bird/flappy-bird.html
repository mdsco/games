<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <link rel="stylesheet" href="../../shared/common.css">
    <link rel="stylesheet" href="flappy-bird.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>FLAPPY BIRD</h1>
        </div>

        <div class="game-content">
            <div class="side-panel">
                <div class="info-box">
                    <h2>Score</h2>
                    <div id="score">0</div>
                </div>
                <div class="info-box">
                    <h2>Best</h2>
                    <div id="best-score">0</div>
                </div>

                <div class="controls-section">
                    <h2>Controls</h2>
                    <div class="control-item">
                        <span class="key">SPACE</span>
                        <span>Flap/Start</span>
                    </div>
                    <div class="control-item">
                        <span class="key">CLICK</span>
                        <span>Flap/Start</span>
                    </div>
                    <div class="control-item">
                        <span class="key">R</span>
                        <span>Restart</span>
                    </div>
                    <button id="start-btn" class="action-btn">Start Game</button>
                    <a href="../../dashboard.html" class="back-btn">← Back to Menu</a>
                </div>
            </div>

            <div class="game-area">
                <canvas id="game-canvas" width="400" height="600"></canvas>

                <!-- Start screen overlay -->
                <div id="start-screen" class="overlay">
                    <h2>Flappy Bird</h2>
                    <p>Click or press SPACE to start!</p>
                    <p class="instructions">Tap to flap and avoid the pipes</p>
                </div>

                <!-- Game Over overlay -->
                <div id="game-over" class="game-over hidden">
                    <h2>Game Over!</h2>
                    <p>Score: <span id="final-score">0</span></p>
                    <p>Best: <span id="final-best">0</span></p>
                    <p id="new-record" class="new-record hidden">🏆 New Record! 🏆</p>
                    <button id="restart-btn">Play Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="flappy-bird.js"></script>
</body>
</html>
