<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="../../shared/common.css">
    <link rel="stylesheet" href="snake.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>SNAKE</h1>
        </div>

        <div class="game-content">
            <div class="side-panel">
                <div class="info-box">
                    <h2>Score</h2>
                    <div id="score">0</div>
                </div>
                <div class="info-box">
                    <h2>High Score</h2>
                    <div id="high-score">0</div>
                </div>
                <div class="info-box">
                    <h2>Speed</h2>
                    <div id="speed">1</div>
                </div>
            </div>

            <div class="game-area">
                <canvas id="game-board" width="500" height="500"></canvas>
                <div id="game-over" class="game-over hidden">
                    <h2>Game Over!</h2>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <p>High Score: <span id="final-high-score">0</span></p>
                    <button id="restart-btn">Play Again</button>
                </div>
            </div>

            <div class="controls-panel">
                <h2>Controls</h2>
                <div class="control-item">
                    <span class="key">←</span>
                    <span>Move Left</span>
                </div>
                <div class="control-item">
                    <span class="key">→</span>
                    <span>Move Right</span>
                </div>
                <div class="control-item">
                    <span class="key">↑</span>
                    <span>Move Up</span>
                </div>
                <div class="control-item">
                    <span class="key">↓</span>
                    <span>Move Down</span>
                </div>
                <div class="control-item">
                    <span class="key">SPACE</span>
                    <span>Start/Restart</span>
                </div>
                <div class="control-item">
                    <span class="key">P</span>
                    <span>Pause</span>
                </div>
                <button id="start-btn" class="action-btn">Start Game</button>
                <a href="../../dashboard.html" class="back-btn">← Back to Menu</a>
            </div>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
